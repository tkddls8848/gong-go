<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>나라장터 로컬 공고 조회</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>나라장터 로컬 공고 조회</h1>
      <p class="subtitle">로컬 CSV에 저장한 사전공고와 본공고를 조회합니다.</p>
    </header>

    <section class="panel">
      <h2>조회 조건</h2>
      <p id="status" class="hint">로컬 CSV를 불러오는 중입니다.</p>
      <div class="search-grid">
        <label>검색어<input id="q" placeholder="기관명, 공고번호, 사업명"></label>
        <label>유형<select id="mode"><option value="">전체</option><option value="pre">사전공고</option><option value="bid">본공고</option></select></label>
        <label>업무구분<select id="business-type"><option value="">전체</option><option>물품</option><option>외자</option><option>용역</option><option>공사</option></select></label>
      </div>
      <div class="options-row">
        <span class="option-label">게시일</span>
        <input id="begin" class="date-input" type="date">
        <span class="date-sep">~</span>
        <input id="end" class="date-input" type="date">
        <button id="search" class="primary-btn" type="button">검색</button>
        <button id="reset" class="secondary-btn" type="button">초기화</button>
      </div>
    </section>

    <section class="panel">
      <div class="results-header"><h2>조회 결과 <span id="result-summary"></span></h2><div class="download-actions"><button id="download-btn" class="secondary-btn" type="button" disabled>CSV로 다운로드</button><button id="download-ecr-btn" class="secondary-btn" type="button" disabled>ECR 펼쳐서 내보내기</button></div></div>
      <div class="table-scroll"><table><thead><tr><th>유형</th><th>공고번호</th><th>업무</th><th>수요기관</th><th>사업명(공고명)</th><th>게시일</th><th>마감일</th></tr></thead><tbody id="results"></tbody></table></div>
      <div class="pagination"><button id="previous" class="secondary-btn" type="button">이전</button><span id="page-label">-</span><button id="next" class="secondary-btn" type="button">다음</button></div>
    </section>
  </div>
  <div id="file-modal" class="modal-backdrop" style="display: none;">
    <div class="modal">
      <div class="modal-header"><h3 id="modal-title">첨부파일</h3><button id="modal-close" class="modal-close" type="button">&times;</button></div>
      <p class="hint" id="modal-subtitle"></p>
      <div class="modal-tabs"><button class="modal-tab active" data-tab="files" type="button">첨부파일</button><button id="ecr-tab" class="modal-tab" data-tab="ecr" type="button">ECR 규격</button></div>
      <div id="files-content"><ul id="modal-file-list" class="file-list"></ul><div class="modal-footer"><p class="hint">파일은 나라장터 서버에서 새 창으로 열립니다. 전체 다운로드를 사용하려면 팝업을 허용하세요.</p><button id="download-all-btn" class="primary-btn" type="button">전체 다운로드</button></div></div>
      <div id="ecr-content" hidden></div>
      <p class="modal-disclaimer">ECR 결과는 1차 참고용이며 최종 확인은 원문으로 해야 합니다.</p>
    </div>
  </div>
  <template id="empty-row"><tr><td colspan="7" class="empty">표시할 공고가 없습니다.</td></tr></template>
  <script src="app.js"></script>
</body>
</html>
